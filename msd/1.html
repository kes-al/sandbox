<html lang="en">
<head>
<meta charset="UTF-8">

<title>MPulse Studio — Animated Logo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  svg.main-logo {
    width: min(85vw, 750px);
    height: auto;
  }

  .monogram-stroke {
    fill: none;
    stroke: #007A73;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
  }

  .monogram-fill {
    opacity: 0;
    transition: opacity 0.6s ease-out;
  }
  .monogram-fill.visible { opacity: 1; }

  .connector-line {
    fill: none;
    stroke: #007A73;
    stroke-width: 1.5;
    stroke-linecap: round;
  }

  .text-fade {
    opacity: 0;
    transition: opacity 0.5s ease-out;
  }
  .text-fade.visible { opacity: 1; }

  .studio-bar {
    opacity: 0;
    transition: opacity 0.5s ease-out;
  }
  .studio-bar.visible { opacity: 1; }

  .replay {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(0, 122, 115, 0.08);
    border: 1px solid rgba(0, 122, 115, 0.2);
    color: #007A73;
    padding: 8px 18px;
    border-radius: 5px;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.4s ease-out, background 0.2s;
  }
  .replay.visible { opacity: 1; }
  .replay:hover { background: rgba(0, 122, 115, 0.15); }
</style>
</head>

</div>

<button class="replay" id="replayBtn" onclick="location.reload()">↻ Replay</button>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    const stroke = document.getElementById('monoStroke');
    const fill = document.getElementById('monoFill');
    const connLine = document.getElementById('connLine');
    const studioBar = document.getElementById('studioBar');
    const replayBtn = document.getElementById('replayBtn');
    const textFades = document.querySelectorAll('.text-fade');

    const totalLen = stroke.getTotalLength();
    const lineLen = connLine.getTotalLength();
    const ecgEnd = 0.50 * totalLen;

    // Hide stroke, then reveal once dasharray is set
    stroke.style.strokeDasharray = totalLen;
    stroke.style.strokeDashoffset = totalLen;
    stroke.style.opacity = 1;

    // Hide connector line
    connLine.style.strokeDasharray = lineLen;
    connLine.style.strokeDashoffset = lineLen;

    // ---- BUILD ECG SPEED MAP ----
    // Sample the path Y-values to know where the spikes are.
    // Spikes (big Y deviation from baseline ~132) = fast drawing
    // Flat sections (near baseline) = slow, steady drawing
    const BASELINE_Y = 132;
    const SAMPLES = 200;
    const ecgSampleLen = ecgEnd / SAMPLES;
    const speeds = [];

    for (let i = 0; i < SAMPLES; i++) {
      const len = (i + 0.5) * ecgSampleLen;
      const pt = stroke.getPointAtLength(len);
      const deviation = Math.abs(pt.y - BASELINE_Y);
      // More deviation from baseline = faster speed
      // Flat (deviation ~0) → speed 0.3x
      // Spike (deviation ~70+) → speed 3x
      const speed = 0.3 + (deviation / 25) * 1.0;
      speeds.push(Math.min(speed, 3.5));
    }

    // Normalize speeds so total time is predictable
    const totalSpeed = speeds.reduce((a, b) => a + b, 0);
    const normalizedSpeeds = speeds.map(s => s / totalSpeed);

    // Build cumulative time map: for each sample, what fraction of total ECG time has elapsed
    const cumTime = [0];
    for (let i = 0; i < SAMPLES; i++) {
      cumTime.push(cumTime[i] + normalizedSpeeds[i]);
    }

    // Function: given elapsed time fraction (0-1), return path length fraction drawn
    function ecgTimeToLength(timeFrac) {
      // Find which sample bracket we're in
      for (let i = 0; i < SAMPLES; i++) {
        if (timeFrac <= cumTime[i + 1]) {
          const localFrac = (timeFrac - cumTime[i]) / (cumTime[i + 1] - cumTime[i]);
          return ((i + localFrac) / SAMPLES) * ecgEnd;
        }
      }
      return ecgEnd;
    }

    // ---- TIMING ----
    const DELAY = 400;
    const ECG_DUR = 2000;
    const REST_DUR = 1200;
    const FILL_DELAY = 150;
    const LINE_DUR = 400;
    const TEXT_DELAY = 150;

    // ---- PHASE 1: Draw ECG with variable speed ----
    setTimeout(() => {
      const startTime = performance.now();

      function animateECG(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / ECG_DUR, 1);

        const drawn = ecgTimeToLength(progress);
        stroke.style.strokeDashoffset = totalLen - drawn;

        if (progress < 1) {
          requestAnimationFrame(animateECG);
        } else {
          stroke.style.strokeDashoffset = totalLen - ecgEnd;
          animateRest();
        }
      }

      requestAnimationFrame(animateECG);
    }, DELAY);

    // ---- PHASE 2: Draw rest of monogram (50% → 100%) ----
    function animateRest() {
      const startTime = performance.now();
      const restLen = totalLen - ecgEnd;

      function animate(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / REST_DUR, 1);
        const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic

        const drawn = ecgEnd + restLen * eased;
        stroke.style.strokeDashoffset = totalLen - drawn;

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          stroke.style.strokeDashoffset = 0;
          setTimeout(() => {
            fill.classList.add('visible');
            drawConnectorLine();
          }, FILL_DELAY);
        }
      }

      requestAnimationFrame(animate);
    }

    // ---- PHASE 3: Connector line ----
    function drawConnectorLine() {
      connLine.animate([
        { strokeDashoffset: lineLen },
        { strokeDashoffset: 0 }
      ], {
        duration: LINE_DUR,
        easing: 'cubic-bezier(0.4, 0, 0.2, 1)',
        fill: 'forwards'
      }).onfinish = () => {
        setTimeout(() => {
          studioBar.classList.add('visible');
          textFades.forEach(el => el.classList.add('visible'));
          setTimeout(() => replayBtn.classList.add('visible'), 800);
        }, TEXT_DELAY);
      };
    }
  });
</script>

</body>
</html>
