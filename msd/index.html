<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPulse Studio — Logo Animation Review</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    color: #333;
    padding: 48px 24px 64px;
    min-height: 100vh;
  }

  .page-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .page-header h1 {
    color: #007A73;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 8px;
  }

  .page-header p {
    color: #999;
    font-size: 14px;
  }

  .cards {
    display: flex;
    gap: 28px;
    justify-content: center;
    align-items: stretch;
    max-width: 1160px;
    margin: 0 auto 52px;
  }

  .card {
    flex: 1;
    max-width: 550px;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    padding: 28px 24px 24px;
    cursor: pointer;
    transition: box-shadow 0.3s ease, border-color 0.3s ease;
    background: #fff;
  }

  .card:hover {
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
    border-color: #ccc;
  }

  .card-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #007A73;
    margin-bottom: 20px;
    text-align: center;
  }

  .anim-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 180px;
  }

  .anim-wrap svg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ===== VOTE ===== */
  .vote-section {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .vote-btn {
    padding: 12px 28px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    background: #fff;
    color: #666;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    line-height: 1;
  }

  .vote-btn:hover {
    border-color: #007A73;
    color: #007A73;
  }

  .vote-btn.selected {
    background: #007A73;
    border-color: #007A73;
    color: #fff;
  }

  .vote-btn .check {
    display: none;
  }

  .vote-btn.selected .check {
    display: inline;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 900px) {
    body { padding: 32px 16px 48px; }
    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-size: 20px; }
    .cards {
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .card { max-width: 100%; width: 100%; }
  }

  /* ============================
     OPTION A — scoped styles
     ============================ */
  #anim-a .a-stroke {
    fill: none;
    stroke: #007A73;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0;
  }

  #anim-a .a-fill {
    opacity: 0;
    transition: opacity 0.6s ease-out;
  }
  #anim-a .a-fill.vis { opacity: 1; }

  #anim-a .a-line {
    fill: none;
    stroke: #007A73;
    stroke-width: 1.5;
    stroke-linecap: round;
  }

  #anim-a .a-txt {
    opacity: 0;
    transition: opacity 0.5s ease-out;
  }
  #anim-a .a-txt.vis { opacity: 1; }

  #anim-a .a-bar {
    opacity: 0;
    transition: opacity 0.5s ease-out;
  }
  #anim-a .a-bar.vis { opacity: 1; }

  /* ============================
     OPTION B — scoped styles
     ============================ */
  #anim-b .b-stroke {
    fill: none;
    stroke: #007A73;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  #anim-b .b-fill { opacity: 0; }
  #anim-b .b-txt  { opacity: 0; }
  #anim-b .b-bar  { opacity: 0; }

  #anim-b.playing .b-stroke {
    animation: bDraw var(--b-dur) cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  #anim-b.playing .b-fill {
    animation: bReveal 0.8s ease-out 2.8s forwards;
  }
  #anim-b.playing .b-bar {
    animation: bReveal 0.6s ease-out 3s forwards;
  }
  #anim-b.playing .b-txt {
    animation: bReveal 0.6s ease-out 3s forwards;
  }

  @keyframes bReveal {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>

<div class="vote-section">
  <button class="vote-btn" onclick="vote(this)"><span class="check">&#10003; </span>I prefer Option A</button>
  <button class="vote-btn" onclick="vote(this)"><span class="check">&#10003; </span>I prefer Option B</button>
</div>

<script>
/* ===== VOTE ===== */
function vote(btn) {
  document.querySelectorAll('.vote-btn').forEach(function(b) { b.classList.remove('selected'); });
  btn.classList.add('selected');
}

/* ==========================================================
   OPTION A — JS-driven ECG draw with variable speed
   ========================================================== */
(function() {
  var rafId = null;
  var timers = [];
  var lineAnim = null;

  var wrap      = document.getElementById('anim-a');
  var stroke    = document.getElementById('a-stroke');
  var fill      = document.getElementById('a-fill');
  var line      = document.getElementById('a-line');
  var bar       = document.getElementById('a-bar');
  var texts     = wrap.querySelectorAll('.a-txt');

  var totalLen  = stroke.getTotalLength();
  var lineLen   = line.getTotalLength();
  var ecgEnd    = 0.50 * totalLen;

  /* — speed map — */
  var BASELINE = 132, N = 200;
  var seg = ecgEnd / N, speeds = [], i;
  for (i = 0; i < N; i++) {
    var pt = stroke.getPointAtLength((i + 0.5) * seg);
    speeds.push(Math.min(0.3 + Math.abs(pt.y - BASELINE) / 25, 3.5));
  }
  var sum = speeds.reduce(function(a, b) { return a + b; }, 0);
  var norm = speeds.map(function(s) { return s / sum; });
  var cum = [0];
  for (i = 0; i < N; i++) cum.push(cum[i] + norm[i]);

  function ecgLen(t) {
    for (var j = 0; j < N; j++) {
      if (t <= cum[j + 1]) {
        var f = (t - cum[j]) / (cum[j + 1] - cum[j]);
        return ((j + f) / N) * ecgEnd;
      }
    }
    return ecgEnd;
  }

  var DELAY = 400, ECG = 2000, REST = 1200, FILL_D = 150, LINE_D = 400, TXT_D = 150;

  function clearAll() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    timers.forEach(clearTimeout);
    timers = [];
    if (lineAnim) { lineAnim.cancel(); lineAnim = null; }
    line.getAnimations().forEach(function(a) { a.cancel(); });
  }

  function reset() {
    clearAll();
    var els = [fill, bar].concat(Array.from(texts));
    els.forEach(function(el) { el.style.transition = 'none'; el.classList.remove('vis'); });
    void wrap.offsetHeight;
    els.forEach(function(el) { el.style.transition = ''; });
    stroke.style.strokeDasharray  = totalLen;
    stroke.style.strokeDashoffset = totalLen;
    stroke.style.opacity = '0';
    line.style.strokeDasharray  = lineLen;
    line.style.strokeDashoffset = lineLen;
  }

  function play() {
    reset();
    stroke.style.opacity = '1';

    timers.push(setTimeout(function() {
      var t0 = performance.now();
      function tick(now) {
        var p = Math.min((now - t0) / ECG, 1);
        stroke.style.strokeDashoffset = totalLen - ecgLen(p);
        if (p < 1) rafId = requestAnimationFrame(tick);
        else { stroke.style.strokeDashoffset = totalLen - ecgEnd; rest(); }
      }
      rafId = requestAnimationFrame(tick);
    }, DELAY));
  }

  function rest() {
    var t0 = performance.now(), rLen = totalLen - ecgEnd;
    function tick(now) {
      var p = Math.min((now - t0) / REST, 1);
      var e = 1 - Math.pow(1 - p, 3);
      stroke.style.strokeDashoffset = totalLen - (ecgEnd + rLen * e);
      if (p < 1) rafId = requestAnimationFrame(tick);
      else {
        stroke.style.strokeDashoffset = 0;
        timers.push(setTimeout(function() {
          fill.classList.add('vis');
          drawLine();
        }, FILL_D));
      }
    }
    rafId = requestAnimationFrame(tick);
  }

  function drawLine() {
    lineAnim = line.animate(
      [{ strokeDashoffset: lineLen }, { strokeDashoffset: 0 }],
      { duration: LINE_D, easing: 'cubic-bezier(0.4,0,0.2,1)', fill: 'forwards' }
    );
    lineAnim.onfinish = function() {
      timers.push(setTimeout(function() {
        bar.classList.add('vis');
        texts.forEach(function(el) { el.classList.add('vis'); });
      }, TXT_D));
    };
  }

  window.playA = play;
  play();
})();

/* ==========================================================
   OPTION B — CSS-driven draw + fade (class-toggled)
   ========================================================== */
(function() {
  var wrap   = document.getElementById('anim-b');
  var stroke = document.getElementById('b-stroke');
  var len    = stroke.getTotalLength();

  /* inject keyframe with real path length */
  var s = document.createElement('style');
  s.textContent = '@keyframes bDraw{from{stroke-dashoffset:' + len + '}to{stroke-dashoffset:0}}';
  document.head.appendChild(s);

  stroke.style.strokeDasharray  = len;
  stroke.style.strokeDashoffset = len;
  wrap.style.setProperty('--b-dur', '3s');

  function play() {
    wrap.classList.remove('playing');
    stroke.style.strokeDashoffset = len;
    void wrap.offsetHeight;
    wrap.classList.add('playing');
  }

  window.playB = play;
  setTimeout(play, 500);
})();
</script>

</body>
</html>
