<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>MPulse Studio — Animated Logo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: system-ui, sans-serif;
  }

  .wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  svg.main-logo {
    width: min(85vw, 750px);
    height: auto;
  }

  /* ============================================
     MONOGRAM — the big icon path (draw-in)
     ============================================ */
  .monogram-stroke {
    fill: none;
    stroke: url(#animGrad);
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 2000;
    stroke-dashoffset: 2000;
    animation: drawMonogram 3s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards;
  }

  .monogram-fill {
    opacity: 0;
    animation: revealFill 0.8s ease-out 2.8s forwards;
  }

  /* ============================================
     STUDIO BADGE BAR
     ============================================ */
  .studio-bar {
    opacity: 0;
    animation: revealFill 0.6s ease-out 3s forwards;
  }

  /* ============================================
     TEXT: "MPulse" + "STUDIO" — all fade in together
     ============================================ */
  .text-fade {
    opacity: 0;
    animation: revealFill 0.6s ease-out 3s forwards;
  }

  /* ============================================
     GLOW / ATMOSPHERE
     ============================================ */
  .glow-pulse {
    position: fixed;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(46, 139, 137, 0.06) 0%, transparent 70%);
    pointer-events: none;
    opacity: 0;
    animation: glowBreathe 4s ease-in-out 2.5s infinite;
  }

  /* ============================================
     KEYFRAMES
     ============================================ */
  @keyframes drawMonogram {
    0% { stroke-dashoffset: 2000; }
    100% { stroke-dashoffset: 0; }
  }

  @keyframes revealFill {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }

  @keyframes glowBreathe {
    0%, 100% { opacity: 0; transform: scale(0.9); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  /* Scanline effect at the start */
  .scanline {
    position: fixed;
    top: 50%;
    left: 0;
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, #2E8B89 30%, #4db8a4 50%, #2E8B89 70%, transparent 100%);
    opacity: 0;
    transform: scaleX(0);
    animation: scan 1.2s ease-in-out 0s forwards;
    pointer-events: none;
    box-shadow: 0 0 20px rgba(46, 139, 137, 0.2), 0 0 60px rgba(46, 139, 137, 0.08);
  }

  @keyframes scan {
    0% { opacity: 0; transform: scaleX(0); }
    40% { opacity: 0.6; transform: scaleX(0.6); }
    70% { opacity: 0.3; transform: scaleX(1); }
    100% { opacity: 0; transform: scaleX(1.1); }
  }

  /* Replay */
  .replay {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: rgba(46, 139, 137, 0.08);
    border: 1px solid rgba(46, 139, 137, 0.2);
    color: #2E8B89;
    padding: 8px 18px;
    border-radius: 5px;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0;
    animation: revealFill 0.4s ease-out 4.5s forwards;
    transition: background 0.2s;
  }
  .replay:hover { background: rgba(46, 139, 137, 0.15); }
</style>

<button class="replay" onclick="location.reload()">↻ Replay</button>

<script>
  // Calculate actual path length for precise dash animation
  window.addEventListener('DOMContentLoaded', () => {
    const stroke = document.querySelector('.monogram-stroke');
    if (stroke) {
      const len = stroke.getTotalLength();
      stroke.style.strokeDasharray = len;
      stroke.style.strokeDashoffset = len;
      // Update the animation to use real length
      stroke.style.animation = 'none';
      stroke.offsetHeight; // force reflow
      stroke.style.setProperty('--path-len', len);
      stroke.style.strokeDasharray = len;
      stroke.style.strokeDashoffset = len;
      stroke.style.animation = `drawReal 3s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards`;
    }
  });

  // Add dynamic keyframe using real path length
  const style = document.createElement('style');
  style.textContent = `
    @keyframes drawReal {
      0% { stroke-dashoffset: var(--path-len, 2000); }
      100% { stroke-dashoffset: 0; }
    }
  `;
  document.head.appendChild(style);
</script>
